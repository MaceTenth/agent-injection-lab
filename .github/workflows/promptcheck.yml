name: promptcheck

# Gate changes to your system prompt on its injection-resilience score.
#
# Runs on PRs that touch the prompt, and on manual dispatch — NOT on every push
# to main (so normal commits don't trigger it). Needs an ANTHROPIC_API_KEY repo
# secret (Settings -> Secrets and variables -> Actions). Without the secret the
# job skips cleanly instead of failing.
on:
  pull_request:
    paths: ["prompts/**", "examples/**", "promptcheck.py"]
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Audit the system prompt
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::notice::ANTHROPIC_API_KEY secret not set — skipping the promptcheck audit."
            exit 0
          fi
          # Point --prompt at your real prompt file. Fails the build below --min-score.
          python3 promptcheck.py \
            --prompt examples/hardened.txt \
            --agent \
            --min-score 90 \
            --no-color
